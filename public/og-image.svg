<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#45a049;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Gradient Background Shape -->
  <circle cx="1000" cy="100" r="400" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="200" cy="500" r="300" fill="#4CAF50" opacity="0.05"/>

  <!-- Main Content -->
  <g>
    <!-- Logo Circle -->
    <circle cx="150" cy="315" r="80" fill="#4CAF50"/>
    <text x="150" y="330" font-size="80" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">+</text>

    <!-- Rodyna Text -->
    <text x="280" y="280" font-size="72" font-weight="bold" fill="#374351" font-family="Plus Jakarta Sans, Arial">Rodyna</text>
    <text x="280" y="340" font-size="48" fill="#374351" font-family="Manrope, Arial">Farmacias</text>

    <!-- Tagline -->
    <text x="280" y="390" font-size="32" fill="#374351" opacity="0.8" font-family="Manrope, Arial">Cuidamos lo más importante: Tu Salud</text>

    <!-- Accent Line -->
    <rect x="280" y="420" width="600" height="4" fill="#4CAF50" rx="2"/>
  </g>
</svg>
